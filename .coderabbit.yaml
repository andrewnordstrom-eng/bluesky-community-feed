# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
inheritance: true
language: "en-US"

reviews:
  instructions: |-
    - Check the docs/anti-patterns.md file for known failure modes relevant to the changed files. Flag if a PR reintroduces a documented anti-pattern.
  auto_review:
    enabled: true
    auto_incremental_review: false
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"
