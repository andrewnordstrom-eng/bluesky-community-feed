version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    groups:
      minor-and-patch-web:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
