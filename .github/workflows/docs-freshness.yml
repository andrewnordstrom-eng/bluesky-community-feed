name: Docs Freshness

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  docs-freshness:
    name: docs-freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.19.0"

      - name: Run docs verification
        id: docs_verify
        continue-on-error: true
        run: npm run docs:verify

      - name: Open or update docs freshness issue on failure
        if: steps.docs_verify.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Docs freshness check failed';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled docs freshness check failed.',
              '',
              `- Workflow run: ${runUrl}`,
              '- Local repro: `npm run docs:verify`',
              '- Update stale docs and refresh review dates in `docs/freshness.json`.',
            ].join('\n');
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = openIssues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['documentation'],
              });
            }

      - name: Fail workflow if docs verification failed
        if: steps.docs_verify.outcome == 'failure'
        run: exit 1
