name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/bluesky-feed

            # Save current commit for rollback
            PREV_COMMIT=$(git rev-parse HEAD)

            git pull origin main
            RANKING_READINESS_LIBRARY="ops/lib/ranking-worker-readiness.sh"
            if [ ! -r "$RANKING_READINESS_LIBRARY" ]; then
              echo "Required ranking worker readiness library is missing: ${RANKING_READINESS_LIBRARY}"
              exit 1
            fi
            # shellcheck source=/dev/null
            source "$RANKING_READINESS_LIBRARY"
            reject_shared_process_role ".env"
            npm ci --ignore-scripts
            node scripts/audit-allowlist.mjs --audit-level=high
            npm run build
            # Run tests against deterministic defaults from .env.example,
            # not production tuning values from /opt/bluesky-feed/.env.
            ENV_BACKUP=""
            restore_env_file() {
              if [ -n "${ENV_BACKUP}" ] && [ -f "${ENV_BACKUP}" ]; then
                cp "${ENV_BACKUP}" .env
                rm -f "${ENV_BACKUP}"
                ENV_BACKUP=""
              else
                rm -f .env
              fi
            }
            if [ -f .env ]; then
              ENV_BACKUP="$(mktemp /tmp/bluesky-feed-env-backup.XXXXXX)"
              cp .env "${ENV_BACKUP}"
              if ! cmp -s .env "${ENV_BACKUP}"; then
                echo "Failed to verify .env backup integrity"
                rm -f "${ENV_BACKUP}"
                ENV_BACKUP=""
                exit 1
              fi
            fi
            trap restore_env_file EXIT
            if [ ! -f .env.example ]; then
              echo ".env.example is missing; cannot run deterministic deploy tests"
              exit 1
            fi
            cp .env.example .env
            npm run test -- --reporter=verbose --run
            restore_env_file
            trap - EXIT
            cd web && npm ci && npm run build
            cd ..
            # Build the web-next static export too, so cutover (WEB_DIST_DIR /
            # WEB_ROUTING_MODE env flip) is a pure config change with a fresh
            # build already on disk. Serving still defaults to web/dist.
            cd web-next && npm ci
            # One retry absorbs transient failures (e.g. the next/font fetch);
            # a second failure is real and should stop the deploy.
            npm run build || { echo "web-next build failed; retrying once..."; npm run build; }
            cd ..
            cd cli && npm ci && npx tsc
            cd ..
            # Migrations are forward-only and must be applied before either
            # process is cut over. Fail closed unless the dedicated backup
            # mount and newest logical dump are present and readable.
            BACKUP_TARGET=""
            if ! BACKUP_TARGET=$(findmnt -n -o TARGET --target /mnt/host-backups); then
              echo "Could not inspect the dedicated backup mount; refusing migration"
              exit 1
            fi
            if [ "$BACKUP_TARGET" != "/mnt/host-backups" ]; then
              echo "Dedicated backup mount is missing; refusing migration"
              exit 1
            fi
            LATEST_BACKUP=""
            if ! LATEST_BACKUP=$(sudo find /mnt/host-backups/postgres -maxdepth 1 -type f -name 'dump-*.sql.gz' -printf '%T@ %p\n' | sort -nr | sed -n '1p' | cut -d' ' -f2-); then
              echo "Could not inspect PostgreSQL backups; refusing migration"
              exit 1
            fi
            if [ -z "$LATEST_BACKUP" ]; then
              echo "No PostgreSQL backup exists; refusing migration"
              exit 1
            fi
            if ! sudo gzip -t "$LATEST_BACKUP"; then
              echo "Newest PostgreSQL backup failed gzip validation; refusing migration"
              exit 1
            fi
            npm run migrate
            sudo docker compose -f docker-compose.prod.yml up -d --no-deps demo-redis
            for i in 1 2 3 4 5; do
              if sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli ping | grep -q PONG; then
                echo "Isolated demo Redis is ready (attempt $i/5)"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "Isolated demo Redis failed to become ready"
                exit 1
              fi
              sleep 2
            done
            # The split worker is activated only by the separately approved
            # systemd packet. Until then the installed API unit still runs the
            # rollback-compatible PROCESS_ROLE=all default.
            WORKER_INSTALLED=false
            if sudo systemctl cat corgi-ranking-worker.service > /dev/null 2>&1; then
              WORKER_INSTALLED=true
              validate_ranking_worker_stop_timeout \
                <(sudo systemctl cat corgi-ranking-worker.service) \
                ".env"
              WORKER_RESTART_EPOCH_MS=$(date +%s%3N)
              if ! sudo systemctl restart corgi-ranking-worker; then
                echo "Ranking worker restart failed; API was not touched"
                exit 1
              fi

              RANKING_COMMUNITY_ID=""
              if ! RANKING_COMMUNITY_ID=$(resolve_ranking_community_id ".env"); then
                exit 1
              fi
              PROBE_TIMEOUT_SECONDS=5
              ranking_worker_heartbeat_probe() {
                local HEARTBEAT_KEY="$1"
                probe_ranking_worker_heartbeat_with_compose "$PROBE_TIMEOUT_SECONDS" docker-compose.prod.yml "$HEARTBEAT_KEY"
              }
              if ! wait_for_ranking_worker_ready "$RANKING_COMMUNITY_ID" "$WORKER_RESTART_EPOCH_MS" 3 10 ranking_worker_heartbeat_probe; then
                echo "Ranking worker did not become ready; API was not touched"
                exit 1
              fi
            fi
            sudo systemctl restart bluesky-feed

            # Post-deploy health verification (3 retries, 10s apart)
            echo "Waiting 10s for startup..."
            sleep 10
            HEALTHY=false
            for i in 1 2 3; do
              if curl -sf --max-time 5 http://localhost:3001/health/ready > /dev/null 2>&1; then
                echo "Health check passed (attempt $i/3)"
                HEALTHY=true
                break
              fi
              echo "Health check failed (attempt $i/3)"
              sleep 10
            done

            # Prove the running service stores anonymous demo state in the
            # isolated Redis, not merely that the container itself responds.
            if [ "$HEALTHY" = "true" ]; then
              PROBE_TIMESTAMP=$(date +%s)
              PROBE_OCTET=$(( (PROBE_TIMESTAMP % 250) + 1 ))
              PROBE_UUID=$(node -e "process.stdout.write(require('node:crypto').randomUUID())")
              DEMO_CLIENT_NONCE="deploy-probe-${PROBE_UUID}"
              if ! DEMO_RESPONSE=$(curl -fsS --max-time 90 \
                -H 'content-type: application/json' \
                -H "x-forwarded-for: 198.51.100.${PROBE_OCTET}" \
                -d "{\"communityId\":\"open_science_builders\",\"clientNonce\":\"${DEMO_CLIENT_NONCE}\"}" \
                http://localhost:3001/api/demo/sessions); then
                echo "Demo isolation probe could not create a session"
                HEALTHY=false
              elif ! DEMO_SESSION_ID=$(printf '%s' "$DEMO_RESPONSE" | node -e \
                "let body=''; process.stdin.on('data', chunk => body += chunk); process.stdin.on('end', () => { const parsed = JSON.parse(body); const id = parsed?.payload?.session?.sessionId; if (typeof id !== 'string' || !id.startsWith('demo-')) process.exit(1); process.stdout.write(id); });"); then
                echo "Demo isolation probe returned an invalid response envelope"
                HEALTHY=false
              else
                DEMO_KEY="demo:session:${DEMO_SESSION_ID}"
                DEMO_KEY_EXISTS="probe-failed"
                PRODUCTION_KEY_EXISTS="probe-failed"
                DEMO_POLICY="probe-failed"
                DEMO_MAXMEMORY="probe-failed"
                DEMO_APPENDONLY="probe-failed"
                DEMO_SAVE="probe-failed"
                if ! DEMO_KEY_EXISTS=$(sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli --raw EXISTS "$DEMO_KEY"); then
                  echo "Demo Redis session-key probe failed"
                  HEALTHY=false
                fi
                if ! PRODUCTION_KEY_EXISTS=$(sudo docker compose -f docker-compose.prod.yml exec -T redis redis-cli --raw EXISTS "$DEMO_KEY"); then
                  echo "Production Redis isolation probe failed"
                  HEALTHY=false
                fi
                if ! DEMO_POLICY=$(sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli --raw CONFIG GET maxmemory-policy | tail -n 1); then
                  echo "Demo Redis maxmemory-policy probe failed"
                  HEALTHY=false
                fi
                if ! DEMO_MAXMEMORY=$(sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli --raw CONFIG GET maxmemory | tail -n 1); then
                  echo "Demo Redis maxmemory probe failed"
                  HEALTHY=false
                fi
                if ! DEMO_APPENDONLY=$(sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli --raw CONFIG GET appendonly | tail -n 1); then
                  echo "Demo Redis appendonly probe failed"
                  HEALTHY=false
                fi
                if ! DEMO_SAVE=$(sudo docker compose -f docker-compose.prod.yml exec -T demo-redis redis-cli --raw CONFIG GET save | tail -n 1); then
                  echo "Demo Redis save-policy probe failed"
                  HEALTHY=false
                fi
                if [ "$HEALTHY" != "true" ] || [ "$DEMO_KEY_EXISTS" != "1" ] || [ "$PRODUCTION_KEY_EXISTS" != "0" ] || \
                   [ "$DEMO_POLICY" != "noeviction" ] || [ "$DEMO_MAXMEMORY" != "67108864" ] || \
                   [ "$DEMO_APPENDONLY" != "no" ] || [ -n "$DEMO_SAVE" ]; then
                  echo "Demo Redis isolation or bounded-memory policy verification failed"
                  HEALTHY=false
                else
                  echo "Demo API isolation verified: session state is absent from production Redis"
                fi
              fi
            fi

            if [ "$HEALTHY" = "false" ]; then
              echo "DEPLOY FAILED: service unhealthy after restart"
              echo "Rolling back to $PREV_COMMIT..."
              git checkout "$PREV_COMMIT"
              npm ci --ignore-scripts
              npm run build
              # Best-effort frontend rebuilds at the rolled-back commit: the
              # previous good build artifacts are still on disk (gitignored,
              # untouched by checkout), so a rebuild failure must never block
              # the service restart that completes the rollback.
              (cd web && npm ci && npm run build) || echo "WARNING: web rollback rebuild failed; serving prior artifacts"
              (cd web-next && npm ci && npm run build) || echo "WARNING: web-next rollback rebuild failed; serving prior artifacts"
              sudo systemctl restart bluesky-feed
              if [ "$WORKER_INSTALLED" = "true" ]; then
                sudo systemctl restart corgi-ranking-worker || true
              fi
              sleep 5
              echo "Rollback complete. Current health:"
              curl -s http://localhost:3001/health || echo "Still unhealthy after rollback"
              exit 1
            fi

            echo "Deploy successful"

      - name: Ping health monitor on success
        if: success()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "${HC_URL:-}" ]; then
            curl -fsS "${HC_URL}" || true
          fi

      - name: Alert on deploy failure
        if: failure()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "${HC_URL:-}" ]; then
            curl -fsS "${HC_URL}/fail" || true
          fi
