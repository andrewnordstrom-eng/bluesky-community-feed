name: Daily Health Check

on:
  schedule:
    - cron: '0 8 * * *' # Daily 8 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error title=Missing secret::Required repository secret DATABASE_URL is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_HOST is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_USER:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_USER is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_SSH_KEY is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH access
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST_KEY: ${{ secrets.VPS_SSH_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          if [ -n "${VPS_SSH_HOST_KEY:-}" ]; then
            printf '%s\n' "${VPS_SSH_HOST_KEY}" > "$HOME/.ssh/known_hosts"
            chmod 644 "$HOME/.ssh/known_hosts"
            echo "SSH_STRICT_OPTS=-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" >> "$GITHUB_ENV"
          else
            echo "SSH_STRICT_OPTS=-o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"
          fi

      - name: Check epoch status on VPS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          DB_Q=$(printf '%q' "$DATABASE_URL")
          ssh $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/bluesky-feed && DATABASE_URL=${DB_Q} node cli/dist/index.js epoch status --direct --json"

      - name: Check local service health on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}" \
            "curl -sf --max-time 10 http://localhost:3001/health/ready > /dev/null"

      - name: Check public endpoint
        run: |
          if curl -sf --max-time 10 https://feed.corgi.network/health/live > /dev/null 2>&1; then
            echo "Public health endpoint OK"
          else
            echo "Public health endpoint unreachable"
            exit 1
          fi

      - name: Ping health monitor on success
        if: success()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "${HC_URL:-}" ]; then
            curl -fsS "${HC_URL}" || true
          fi

      - name: Alert health monitor on failure
        if: failure()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "${HC_URL:-}" ]; then
            curl -fsS "${HC_URL}/fail" || true
          fi

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = 'Feed Health Alert - ' + today;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident',
              per_page: 10,
            });

            const alreadyOpen = existing.data.some(i => i.title === title);
            if (alreadyOpen) {
              console.log('Issue already exists for today, skipping');
              return;
            }

            const runUrl = [
              context.serverUrl,
              context.repo.owner,
              context.repo.repo,
              'actions/runs',
              context.runId,
            ].join('/');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The daily health check workflow failed.',
                '',
                '**Run:** ' + runUrl,
                '**Time:** ' + new Date().toISOString(),
                '',
                'Check the workflow logs for details.',
              ].join('\n'),
              labels: ['incident'],
            });
