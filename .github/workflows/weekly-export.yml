name: Weekly Research Export

on:
  schedule:
    - cron: '0 6 * * 0' # Sunday 6 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXPORT_ANONYMIZATION_SALT: ${{ secrets.EXPORT_ANONYMIZATION_SALT }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error title=Missing secret::Required repository secret DATABASE_URL is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${EXPORT_ANONYMIZATION_SALT:-}" ]; then
            echo "::error title=Missing secret::Required repository secret EXPORT_ANONYMIZATION_SALT is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_HOST is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_USER:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_USER is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error title=Missing secret::Required repository secret VPS_SSH_KEY is not set. Add it in Settings -> Secrets and variables -> Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH access
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST_KEY: ${{ secrets.VPS_SSH_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          if [ -n "${VPS_SSH_HOST_KEY:-}" ]; then
            printf '%s\n' "${VPS_SSH_HOST_KEY}" > "$HOME/.ssh/known_hosts"
            chmod 644 "$HOME/.ssh/known_hosts"
            echo "SSH_STRICT_OPTS=-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" >> "$GITHUB_ENV"
          else
            echo "SSH_STRICT_OPTS=-o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"
          fi

      - name: Export CSVs on VPS and copy artifacts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          REMOTE_EXPORT_DIR="/tmp/weekly-export-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          ssh $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}" "REMOTE_EXPORT_DIR='${REMOTE_EXPORT_DIR}' bash -s" <<'EOF'
          set -euo pipefail

          get_env_value() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" .env | head -n 1 | cut -d= -f2- || true)"
            value="${value%$'\r'}"
            value="$(printf '%s' "$value" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
            printf '%s' "$value"
          }

          cd /opt/bluesky-feed
          rm -rf "$REMOTE_EXPORT_DIR"
          mkdir -p "$REMOTE_EXPORT_DIR"

          BOT_HANDLE="$(get_env_value BOT_HANDLE)"
          BOT_APP_PASSWORD="$(get_env_value BOT_APP_PASSWORD)"
          BSKY_IDENTIFIER="$(get_env_value BSKY_IDENTIFIER)"
          BSKY_APP_PASSWORD="$(get_env_value BSKY_APP_PASSWORD)"

          login_ok=0
          if [ -n "$BOT_HANDLE" ] && [ -n "$BOT_APP_PASSWORD" ]; then
            if node cli/dist/index.js --server http://localhost:3001 --quiet login "$BOT_HANDLE" "$BOT_APP_PASSWORD"; then
              login_ok=1
            fi
          fi

          if [ "$login_ok" -eq 0 ] && [ -n "$BSKY_IDENTIFIER" ] && [ -n "$BSKY_APP_PASSWORD" ]; then
            if node cli/dist/index.js --server http://localhost:3001 --quiet login "$BSKY_IDENTIFIER" "$BSKY_APP_PASSWORD"; then
              login_ok=1
            fi
          fi

          if [ "$login_ok" -eq 0 ]; then
            echo "No valid export credentials found in /opt/bluesky-feed/.env (tried BOT_* and BSKY_*)." >&2
            exit 1
          fi

          EPOCH_ID="$(
            curl -fsS http://localhost:3001/api/governance/epochs/current \
              | node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync(0, "utf8")); if (!Number.isInteger(data?.id)) { process.exit(1); } process.stdout.write(String(data.id));'
          )"
          if [ -z "$EPOCH_ID" ]; then
            echo "Could not resolve current epoch ID from local governance API." >&2
            exit 1
          fi

          node cli/dist/index.js --server http://localhost:3001 --quiet export votes --epoch="$EPOCH_ID" --format=csv > "$REMOTE_EXPORT_DIR/votes.csv"
          node cli/dist/index.js --server http://localhost:3001 --quiet export scores --epoch="$EPOCH_ID" --format=csv > "$REMOTE_EXPORT_DIR/scores.csv"
          node cli/dist/index.js --server http://localhost:3001 --quiet logout || true
          EOF

          mkdir -p data/exports
          scp $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}:${REMOTE_EXPORT_DIR}/votes.csv" data/exports/votes.csv
          scp $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}:${REMOTE_EXPORT_DIR}/scores.csv" data/exports/scores.csv
          ssh $SSH_STRICT_OPTS "${VPS_USER}@${VPS_HOST}" "rm -rf ${REMOTE_EXPORT_DIR}"

      - name: Upload exports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: weekly-export-${{ github.run_number }}
          path: data/exports/
          retention-days: 90
