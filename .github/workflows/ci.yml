name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-verify:
    name: docs-verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.19.0"

      - name: Verify docs freshness and integrity
        run: npm run docs:verify

  backend-verify:
    name: backend-verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci --ignore-scripts

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Prepare backend test env
        run: cp .env.example .env

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test -- --run

      - name: Build CLI
        run: npm run cli:build

      - name: Build local MCP server
        run: npm run build:mcp-local

      - name: Security audit (backend)
        run: node scripts/audit-allowlist.mjs --audit-level=moderate

  frontend-verify:
    name: frontend-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: cd web && npm ci

      # Supply-chain guard for axios: require an EXACT pin (no ^/~/range) that
      # matches the resolved package-lock version. Self-maintaining — Dependabot
      # bumps package.json + the lockfile together, so reviewed bumps pass with no
      # manual edit here. Replaces the hard-coded version literal that drifted red
      # on every bump (PROJ-1289 1.16->1.17, PROJ-1499 ->1.18.x).
      - name: Validate frontend Axios pin
        run: |
          node --input-type=module -e '
            import fs from "node:fs";

            const pkg = JSON.parse(fs.readFileSync("web/package.json", "utf8"));
            const lock = JSON.parse(fs.readFileSync("web/package-lock.json", "utf8"));
            const declared = pkg.dependencies?.axios;
            const resolved = lock.packages?.["node_modules/axios"]?.version;
            if (!declared || !/^\d+\.\d+\.\d+$/.test(declared)) {
              throw new Error(`web/package.json must pin axios to an exact version (no ^/~/range); found ${declared ?? "missing"}`);
            }
            if (declared !== resolved) {
              throw new Error(`web/package.json axios (${declared}) must match package-lock.json resolved axios (${resolved ?? "missing"})`);
            }
          '

      - name: Lint frontend
        run: cd web && npm run lint

      - name: Build frontend
        run: cd web && npm run build

      - name: Security audit (frontend)
        run: cd web && npm audit --audit-level=moderate

  report-scripts-verify:
    name: report-scripts-verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install report dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-report.txt

      - name: Compile report scripts
        run: |
          python3 -m py_compile \
            scripts/generate-report.py \
            scripts/generate-report-pdf.py \
            scripts/report_utils.py

      - name: Verify DOCX report script (offline dry-run)
        run: |
          MPLCONFIGDIR=/tmp python3 scripts/generate-report.py \
            --csv tests/fixtures/report/report-sample.csv \
            --epoch-json tests/fixtures/report/epoch-sample.json \
            --dry-run

      - name: Verify PDF report script (offline dry-run)
        run: |
          MPLCONFIGDIR=/tmp python3 scripts/generate-report-pdf.py \
            --csv tests/fixtures/report/report-sample.csv \
            --epoch-json tests/fixtures/report/epoch-sample.json \
            --dry-run
