name: dependabot-automerge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: andrewnordstrom-eng/.github-public/.github/workflows/dependabot-automerge.yml@3c607b1f39d2cf8d6dac6029115ad99964109401

  dependabot-automerge-skip:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Skip for non-Dependabot PRs
        run: echo "Not a Dependabot PR; skipping automerge."
