name: Feature Request
description: Request a product/engineering enhancement.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior and approach.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope (In/Out)
      description: What is explicitly in scope and out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Testable criteria for completion.
    validations:
      required: true
